<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Login - Controle de Chamados</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: linear-gradient(135deg, #1e3c72, #2a5298);
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .box {
      background: white;
      padding: 30px;
      border-radius: 10px;
      width: 300px;
      text-align: center;
      box-shadow: 0 5px 20px rgba(0,0,0,0.3);
    }

    input {
      width: 100%;
      padding: 10px;
      margin: 8px 0;
      border-radius: 5px;
      border: 1px solid #ccc;
    }

    button {
      width: 100%;
      padding: 10px;
      margin-top: 10px;
      border: none;
      border-radius: 5px;
      cursor: pointer;
    }

    .login {
      background: #2a5298;
      color: white;
    }

    .cadastro {
      background: #eee;
    }
  </style>
</head>
<body>

<div class="box">
  <h2>Controle de Chamados</h2>

  <input type="text" placeholder="Usuário">
  <input type="password" placeholder="Senha">

  <button class="login" onclick="login()">Entrar</button>
  <button class="cadastro" onclick="irCadastro()">Cadastrar Usuário</button>
</div>

<script>
function login() {
  alert("Login realizado");
}

function irCadastro() {
  window.location.href = "cadastro.html";
}
</script>

</body>
</html>
