<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login - Controle de Chamados</title>

<style>
*{
  box-sizing:border-box;
}

body{
  margin:0;
  font-family:"Segoe UI";
  background:linear-gradient(135deg,#1e3a8a,#2563eb);
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

.box{
  background:white;
  padding:40px;
  border-radius:20px;
  width:320px;
  box-shadow:0 20px 50px rgba(0,0,0,0.2);
  text-align:center;
}

h2{
  margin-bottom:20px;
}

input{
  width:100%;
  padding:12px;
  margin:10px 0;
  border-radius:10px;
  border:1px solid #ccc;
}

button{
  width:100%;
  padding:12px;
  margin-top:10px;
  border:none;
  border-radius:10px;
  cursor:pointer;
  font-weight:bold;
}

.login{
  background:#2563eb;
  color:white;
}

.login:hover{
  background:#1d4ed8;
}

.cadastro{
  background:#eee;
}

.mensagem{
  margin-top:10px;
  font-size:14px;
}
</style>
</head>

<body>

<div class="box">
  <h2>Controle de Chamados</h2>

  <input id="login" placeholder="Usuário">
  <input id="senha" type="password" placeholder="Senha">

  <button class="login" onclick="login()">Entrar</button>
  <button class="cadastro" onclick="irCadastro()">Cadastrar</button>

  <div id="mensagem" class="mensagem"></div>
</div>

<script>
const API = "https://backend-chamados-production.up.railway.app";

function login() {
  const login = document.getElementById("login").value.trim();
  const senha = document.getElementById("senha").value.trim();
  const msg = document.getElementById("mensagem");

  msg.innerText = "";

  if (!login || !senha) {
    msg.innerText = "Preencha os campos";
    msg.style.color = "red";
    return;
  }

  fetch(`${API}/login`, {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({ login, senha })
  })
  .then(r => r.json())
  .then(data => {
    if (data.erro) {
      msg.innerText = data.erro;
      msg.style.color = "red";
      return;
    }

    const usuario = data.usuario || data;
    localStorage.setItem("usuario", JSON.stringify(usuario));

    msg.innerText = "Login realizado!";
    msg.style.color = "green";

    setTimeout(() => {
      location.href = "painel.html";
    }, 800);
  })
  .catch(() => {
    msg.innerText = "Erro no servidor";
    msg.style.color = "red";
  });
}

function irCadastro() {
  location.href = "cadastro.html";
}
</script>

</body>
</html>
