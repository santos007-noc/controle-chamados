<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - Controle de Chamados</title>

  <style>
    *{
      box-sizing:border-box;
      margin:0;
      padding:0;
      font-family:"Segoe UI", Arial, sans-serif;
    }

    body{
      min-height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      background:
        radial-gradient(circle at top left, rgba(255,255,255,0.12), transparent 25%),
        linear-gradient(135deg, #1e3a8a, #2563eb);
      padding:20px;
    }

    .box{
      width:100%;
      max-width:420px;
      background:rgba(255,255,255,0.97);
      padding:40px 30px;
      border-radius:24px;
      box-shadow:0 25px 60px rgba(0,0,0,0.20);
      text-align:center;
    }

    .icon{
      width:70px;
      height:70px;
      margin:0 auto 15px;
      border-radius:20px;
      background:linear-gradient(135deg, #2563eb, #1e40af);
      display:flex;
      align-items:center;
      justify-content:center;
      color:white;
      font-size:30px;
      box-shadow:0 10px 25px rgba(37,99,235,0.3);
    }

    h1{
      font-size:26px;
      margin-bottom:8px;
      color:#0f172a;
    }

    .sub{
      color:#64748b;
      font-size:14px;
      margin-bottom:25px;
    }

    .campo{
      text-align:left;
      margin-bottom:14px;
    }

    .campo label{
      display:block;
      margin-bottom:6px;
      font-weight:600;
      color:#334155;
      font-size:14px;
    }

    input{
      width:100%;
      padding:13px;
      border-radius:12px;
      border:1px solid #cbd5e1;
      outline:none;
      transition:0.2s;
      background:#f8fafc;
      font-size:15px;
    }

    input:focus{
      border-color:#2563eb;
      background:white;
      box-shadow:0 0 0 4px rgba(37,99,235,0.1);
    }

    button{
      width:100%;
      padding:13px;
      border:none;
      border-radius:12px;
      margin-top:10px;
      font-weight:bold;
      cursor:pointer;
      transition:0.2s;
      font-size:15px;
    }

    button:hover{
      transform:translateY(-1px);
    }

    button:disabled{
      opacity:0.7;
      cursor:not-allowed;
      transform:none;
    }

    .entrar{
      background:linear-gradient(135deg,#2563eb,#1e40af);
      color:white;
    }

    .cadastrar{
      background:#e5e7eb;
      color:#111827;
    }

    .msg{
      margin-top:12px;
      font-size:14px;
      min-height:18px;
      font-weight:600;
    }

    .loading{
      opacity:0.7;
      pointer-events:none;
    }
  </style>
</head>

<body>

  <div class="box">
    <div class="icon">🔐</div>
    <h1>Controle de Chamados</h1>
    <p class="sub">Acesse sua conta</p>

    <div class="campo">
      <label for="login">Usuário</label>
      <input id="login" type="text" placeholder="Digite seu usuário" maxlength="120">
    </div>

    <div class="campo">
      <label for="senha">Senha</label>
      <input id="senha" type="password" placeholder="Digite sua senha" maxlength="120">
    </div>

    <button class="entrar" onclick="entrar()" id="btnEntrar">Entrar</button>
    <button class="cadastrar" onclick="irCadastro()" id="btnCadastro">Cadastrar</button>

    <div id="msg" class="msg"></div>
  </div>

  <script>
    const API = "https://backend-chamados-wgmi.onrender.com";

    function definirEstadoBotoes(carregando) {
      const btnEntrar = document.getElementById("btnEntrar");
      const btnCadastro = document.getElementById("btnCadastro");

      btnEntrar.disabled = carregando;
      btnCadastro.disabled = carregando;

      if (carregando) {
        btnEntrar.innerText = "Entrando...";
        btnEntrar.classList.add("loading");
      } else {
        btnEntrar.innerText = "Entrar";
        btnEntrar.classList.remove("loading");
      }
    }

    async function entrar() {
      const login = document.getElementById("login").value.trim();
      const senha = document.getElementById("senha").value.trim();
      const msg = document.getElementById("msg");

      msg.innerText = "";

      if (!login || !senha) {
        msg.innerText = "Preencha login e senha";
        msg.style.color = "red";
        return;
      }

      definirEstadoBotoes(true);

      try {
        const resposta = await fetch(`${API}/login`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ login, senha })
        });

        let data = null;

        try {
          data = await resposta.json();
        } catch {
          data = { erro: "Resposta inválida do servidor" };
        }

        if (!resposta.ok || data.erro) {
          msg.innerText = data.erro || "Não foi possível realizar o login";
          msg.style.color = "red";
          definirEstadoBotoes(false);
          return;
        }

        localStorage.setItem("usuario", JSON.stringify(data.usuario));

        msg.innerText = "Login realizado!";
        msg.style.color = "green";

        setTimeout(() => {
          window.location.href = "painel.html";
        }, 800);

      } catch (error) {
        console.error("Erro no login:", error);
        msg.innerText = "Erro ao conectar com servidor";
        msg.style.color = "red";
        definirEstadoBotoes(false);
      }
    }

    function irCadastro() {
      window.location.href = "cadastro.html";
    }

    document.addEventListener("keydown", function(e) {
      if (e.key === "Enter") {
        entrar();
      }
    });
  </script>

</body>
</html>
