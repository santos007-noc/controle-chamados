<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Tela de Login</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: linear-gradient(135deg, #1e3c72, #2a5298);
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .box {
      background: white;
      padding: 30px;
      border-radius: 10px;
      width: 300px;
      text-align: center;
      box-shadow: 0 5px 20px rgba(0,0,0,0.3);
    }

    h2 {
      margin-bottom: 20px;
    }

    input {
      width: 100%;
      padding: 10px;
      margin: 8px 0;
      border-radius: 5px;
      border: 1px solid #ccc;
      box-sizing: border-box;
    }

    button {
      width: 100%;
      padding: 10px;
      margin-top: 10px;
      border: none;
      border-radius: 5px;
      cursor: pointer;
    }

    .login {
      background: #2a5298;
      color: white;
    }

    .login:hover {
      background: #1e3c72;
    }

    .cadastro {
      background: #eee;
    }

    .cadastro:hover {
      background: #ddd;
    }

    .mensagem {
      margin-top: 15px;
      font-size: 14px;
      color: red;
    }
  </style>
</head>

<body>

  <div class="box">
    <h2>Controle de Chamados</h2>

    <input type="text" id="login" placeholder="Usuário">
    <input type="password" id="senha" placeholder="Senha">

    <button class="login" onclick="login()">Entrar</button>
    <button class="cadastro" onclick="irCadastro()">Cadastrar Usuário</button>

    <div class="mensagem" id="mensagem"></div>
  </div>

  <script>
    const API_URL = 'https://backend-chamados-production.up.railway.app';

    function login() {
      const loginDigitado = document.getElementById('login').value.trim();
      const senhaDigitada = document.getElementById('senha').value.trim();
      const mensagem = document.getElementById('mensagem');

      mensagem.innerText = '';

      if (!loginDigitado || !senhaDigitada) {
        mensagem.style.color = 'red';
        mensagem.innerText = 'Preencha usuário e senha';
        return;
      }

      fetch(`${API_URL}/login`, {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json'
        },
        body: JSON.stringify({
          login: loginDigitado,
          senha: senhaDigitada
        })
      })
      .then(response => response.json())
      .then(data => {
        if (data.erro) {
          mensagem.style.color = 'red';
          mensagem.innerText = data.erro;
          return;
        }

        localStorage.setItem('usuarioLogado', JSON.stringify(data.usuario));

        mensagem.style.color = 'green';
        mensagem.innerText = 'Login realizado com sucesso!';

        document.getElementById('login').value = '';
        document.getElementById('senha').value = '';

        setTimeout(() => {
          window.location.href = 'painel.html';
        }, 1000);
      })
      .catch(error => {
        console.error('Erro:', error);
        mensagem.style.color = 'red';
        mensagem.innerText = 'Erro ao conectar com o servidor';
      });
    }

    function irCadastro() {
      window.location.href = 'cadastro.html';
    }
  </script>

</body>
</html>
