<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Painel de Chamados</title>

  <style>
    :root{
      --azul-1:#1e3a8a;
      --azul-2:#2563eb;
      --azul-3:#dbeafe;
      --verde:#16a34a;
      --verde-bg:#dcfce7;
      --amarelo:#f59e0b;
      --amarelo-bg:#fef3c7;
      --vermelho:#dc2626;
      --cinza-bg:#eef2f7;
      --cinza-borda:#d9e2ec;
      --texto:#0f172a;
      --texto-suave:#64748b;
      --branco:#ffffff;
      --shadow:0 12px 30px rgba(15, 23, 42, 0.10);
      --radius:18px;
    }

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:"Segoe UI", Arial, sans-serif;
    }

    body{
      background:linear-gradient(180deg,#eaf1fb 0%, #eef2f7 100%);
      color:var(--texto);
      min-height:100vh;
    }

    header{
      background:linear-gradient(135deg,var(--azul-1),var(--azul-2));
      color:white;
      padding:24px 28px;
      display:flex;
      justify-content:space-between;
      align-items:center;
      flex-wrap:wrap;
      gap:16px;
      box-shadow:var(--shadow);
    }

    .header-info h1{
      font-size:2rem;
      margin-bottom:6px;
    }

    .header-info p{
      font-size:0.95rem;
      opacity:0.92;
    }

    .header-actions{
      display:flex;
      align-items:center;
      gap:12px;
      flex-wrap:wrap;
    }

    .user-chip{
      background:rgba(255,255,255,0.16);
      padding:10px 14px;
      border-radius:999px;
      border:1px solid rgba(255,255,255,0.22);
      font-size:14px;
      font-weight:600;
      backdrop-filter:blur(10px);
    }

    .btn{
      border:none;
      border-radius:12px;
      padding:12px 18px;
      cursor:pointer;
      font-weight:700;
      transition:0.2s ease;
    }

    .btn:hover{
      transform:translateY(-1px);
    }

    .btn-primary{
      background:var(--azul-2);
      color:white;
    }

    .btn-success{
      background:var(--verde);
      color:white;
    }

    .btn-warning{
      background:var(--amarelo);
      color:white;
    }

    .btn-danger{
      background:var(--vermelho);
      color:white;
    }

    .btn-light{
      background:#f8fafc;
      color:var(--texto);
      border:1px solid var(--cinza-borda);
    }

    .btn-outline{
      background:rgba(255,255,255,0.14);
      color:white;
      border:1px solid rgba(255,255,255,0.24);
    }

    .container{
      max-width:1200px;
      margin:28px auto;
      padding:0 20px 32px;
    }

    .stats{
      display:grid;
      grid-template-columns:repeat(4,1fr);
      gap:16px;
      margin-bottom:20px;
    }

    .stat-card{
      background:white;
      border-radius:var(--radius);
      padding:20px;
      box-shadow:var(--shadow);
      border:1px solid var(--cinza-borda);
      animation:fadeUp .35s ease;
    }

    .stat-card span{
      display:block;
      color:var(--texto-suave);
      font-size:14px;
      margin-bottom:10px;
      font-weight:600;
    }

    .stat-card strong{
      font-size:30px;
      font-weight:800;
    }

    .toolbar{
      background:white;
      border:1px solid var(--cinza-borda);
      box-shadow:var(--shadow);
      border-radius:var(--radius);
      padding:16px;
      display:flex;
      gap:12px;
      flex-wrap:wrap;
      align-items:center;
      margin-bottom:22px;
      animation:fadeUp .45s ease;
    }

    input, select, textarea{
      width:100%;
      border:1px solid var(--cinza-borda);
      border-radius:12px;
      padding:12px 14px;
      font-size:15px;
      outline:none;
      transition:0.2s;
      background:white;
    }

    input:focus, select:focus, textarea:focus{
      border-color:var(--azul-2);
      box-shadow:0 0 0 4px rgba(37,99,235,0.12);
    }

    #busca{
      flex:1;
      min-width:260px;
    }

    #filtro{
      width:200px;
    }

    .cards{
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(300px,1fr));
      gap:18px;
    }

    .card{
      background:white;
      border-radius:20px;
      border:1px solid var(--cinza-borda);
      box-shadow:var(--shadow);
      padding:20px;
      position:relative;
      overflow:hidden;
      animation:fadeUp .4s ease;
    }

    .card::before{
      content:"";
      position:absolute;
      top:0;
      left:0;
      width:100%;
      height:5px;
      background:linear-gradient(90deg,var(--azul-2),#60a5fa);
    }

    .card h3{
      font-size:24px;
      margin-bottom:10px;
    }

    .descricao{
      color:var(--texto-suave);
      line-height:1.5;
      margin-bottom:16px;
      min-height:44px;
    }

    .meta{
      display:grid;
      gap:8px;
      margin-bottom:16px;
    }

    .meta p{
      font-size:15px;
    }

    .meta b{
      color:var(--texto);
    }

    .meta span{
      color:var(--texto-suave);
    }

    .card-footer{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:12px;
      flex-wrap:wrap;
    }

    .actions{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
    }

    .status{
      padding:8px 14px;
      border-radius:999px;
      font-size:13px;
      font-weight:800;
    }

    .aberto{
      background:var(--azul-3);
      color:#1d4ed8;
    }

    .emandamento{
      background:var(--amarelo-bg);
      color:#a16207;
    }

    .fechado{
      background:var(--verde-bg);
      color:#15803d;
    }

    .empty{
      grid-column:1/-1;
      text-align:center;
      background:white;
      border:1px dashed #cbd5e1;
      border-radius:20px;
      box-shadow:var(--shadow);
      padding:50px 20px;
      color:var(--texto-suave);
      animation:fadeUp .45s ease;
    }

    .empty h3{
      color:var(--texto);
      margin-bottom:8px;
      font-size:24px;
    }

    .toast{
      position:fixed;
      top:20px;
      right:20px;
      padding:14px 18px;
      border-radius:12px;
      color:white;
      font-weight:700;
      box-shadow:var(--shadow);
      z-index:9999;
      animation:fadeIn .25s ease;
    }

    .success{background:var(--verde);}
    .error{background:var(--vermelho);}

    .loading{
      display:none;
      position:fixed;
      inset:0;
      background:rgba(15,23,42,0.35);
      z-index:9998;
      justify-content:center;
      align-items:center;
      backdrop-filter:blur(2px);
    }

    .loading.show{
      display:flex;
    }

    .loader-box{
      background:white;
      padding:24px 28px;
      border-radius:18px;
      box-shadow:var(--shadow);
      display:flex;
      align-items:center;
      gap:14px;
      font-weight:700;
    }

    .spinner{
      width:24px;
      height:24px;
      border:4px solid #dbeafe;
      border-top:4px solid var(--azul-2);
      border-radius:50%;
      animation:spin 0.8s linear infinite;
    }

    .modal{
      display:none;
      position:fixed;
      inset:0;
      background:rgba(15,23,42,0.45);
      z-index:10000;
      justify-content:center;
      align-items:center;
      padding:20px;
    }

    .modal.show{
      display:flex;
    }

    .modal-content{
      width:100%;
      max-width:520px;
      background:white;
      border-radius:22px;
      box-shadow:var(--shadow);
      padding:24px;
      animation:fadeUp .25s ease;
    }

    .modal-content h2{
      margin-bottom:6px;
      font-size:28px;
    }

    .modal-content p{
      color:var(--texto-suave);
      margin-bottom:18px;
    }

    .form-grid{
      display:grid;
      gap:12px;
    }

    textarea{
      resize:vertical;
      min-height:110px;
    }

    .modal-actions{
      display:flex;
      justify-content:flex-end;
      gap:10px;
      margin-top:18px;
      flex-wrap:wrap;
    }

    @keyframes spin{
      to{transform:rotate(360deg);}
    }

    @keyframes fadeIn{
      from{opacity:0;transform:translateY(-8px);}
      to{opacity:1;transform:translateY(0);}
    }

    @keyframes fadeUp{
      from{opacity:0;transform:translateY(12px);}
      to{opacity:1;transform:translateY(0);}
    }

    @media (max-width:900px){
      .stats{
        grid-template-columns:repeat(2,1fr);
      }
    }

    @media (max-width:640px){
      .stats{
        grid-template-columns:1fr;
      }

      .toolbar{
        flex-direction:column;
        align-items:stretch;
      }

      #filtro{
        width:100%;
      }

      .header-info h1{
        font-size:1.7rem;
      }
    }
  </style>
</head>
<body>

  <header>
    <div class="header-info">
      <h1>Painel de Chamados</h1>
      <p>Gerencie solicitações de manutenção de imóveis com mais organização</p>
    </div>

    <div class="header-actions">
      <div class="user-chip" id="usuarioInfo">Usuário</div>
      <button class="btn btn-outline" onclick="logout()">Sair</button>
    </div>
  </header>

  <div class="container">
    <div class="stats">
      <div class="stat-card">
        <span>Total de Chamados</span>
        <strong id="statTotal">0</strong>
      </div>
      <div class="stat-card">
        <span>Em Aberto</span>
        <strong id="statAberto">0</strong>
      </div>
      <div class="stat-card">
        <span>Em Andamento</span>
        <strong id="statAndamento">0</strong>
      </div>
      <div class="stat-card">
        <span>Fechados</span>
        <strong id="statFechado">0</strong>
      </div>
    </div>

    <div class="toolbar">
      <button class="btn btn-success" onclick="abrirModalNovo()">+ Novo Chamado</button>
      <input id="busca" type="text" placeholder="Buscar por título..." oninput="render()">
      <select id="filtro" onchange="render()">
        <option value="">Todos os status</option>
        <option value="Aberto">Aberto</option>
        <option value="Em andamento">Em andamento</option>
        <option value="Fechado">Fechado</option>
      </select>
    </div>

    <div id="lista" class="cards"></div>
  </div>

  <div class="loading" id="loading">
    <div class="loader-box">
      <div class="spinner"></div>
      <span>Carregando...</span>
    </div>
  </div>

  <div class="modal" id="modalChamado">
    <div class="modal-content">
      <h2 id="modalTitulo">Novo Chamado</h2>
      <p id="modalSubtitulo">Preencha as informações abaixo.</p>

      <div class="form-grid">
        <input type="hidden" id="chamadoId">
        <input type="text" id="tituloChamado" placeholder="Título do chamado">
        <input type="text" id="moradorChamado" placeholder="Nome do morador">
        <input type="text" id="localChamado" placeholder="Local do problema">
        <select id="statusChamado">
          <option value="Aberto">Aberto</option>
          <option value="Em andamento">Em andamento</option>
          <option value="Fechado">Fechado</option>
        </select>
        <textarea id="descricaoChamado" placeholder="Descrição do chamado"></textarea>
      </div>

      <div class="modal-actions">
        <button class="btn btn-light" onclick="fecharModal()">Cancelar</button>
        <button class="btn btn-primary" id="btnSalvarModal" onclick="salvarChamado()">Salvar</button>
      </div>
    </div>
  </div>

  <script>
    const API = "https://backend-chamados-production.up.railway.app";
    let chamados = [];
    let usuario = null;
    let modoEdicao = false;

    try {
      usuario =
        JSON.parse(localStorage.getItem("usuario")) ||
        JSON.parse(localStorage.getItem("usuarioLogado"));
    } catch (e) {
      console.error("Erro ao ler localStorage:", e);
    }

    if (!usuario) {
      window.location.href = "index.html";
    }

    if (usuario) {
      usuario.usuario_id = usuario.usuario_id ?? usuario.id ?? usuario.id_usuario ?? usuario.usuarioId;
      usuario.tipo_usuario = usuario.tipo_usuario ?? usuario.tipo ?? usuario.perfil ?? usuario.tipoUser;
      usuario.nome_exibicao = usuario.nome ?? usuario.login ?? usuario.usuario ?? "Usuário";
    }

    document.getElementById("usuarioInfo").innerText =
      `${usuario.nome_exibicao} • ${usuario.tipo_usuario}`;

    function mostrarLoading() {
      document.getElementById("loading").classList.add("show");
    }

    function esconderLoading() {
      document.getElementById("loading").classList.remove("show");
    }

    function toast(msg, type = "success") {
      const t = document.createElement("div");
      t.className = "toast " + type;
      t.innerText = msg;
      document.body.appendChild(t);
      setTimeout(() => t.remove(), 3000);
    }

    function atualizarEstatisticas(lista) {
      document.getElementById("statTotal").innerText = lista.length;
      document.getElementById("statAberto").innerText = lista.filter(c => c.status_chamado === "Aberto").length;
      document.getElementById("statAndamento").innerText = lista.filter(c => c.status_chamado === "Em andamento").length;
      document.getElementById("statFechado").innerText = lista.filter(c => c.status_chamado === "Fechado").length;
    }

    async function carregar() {
      try {
        mostrarLoading();
        const url = `${API}/chamados?usuario_id=${usuario.usuario_id}&tipo_usuario=${encodeURIComponent(usuario.tipo_usuario)}`;
        const res = await fetch(url);
        const texto = await res.text();

        try {
          chamados = JSON.parse(texto);
        } catch {
          chamados = [];
          toast("Erro ao carregar chamados", "error");
          return;
        }

        if (!Array.isArray(chamados)) chamados = [];

        atualizarEstatisticas(chamados);
        render();
      } catch (error) {
        console.error(error);
        toast("Erro ao conectar com o servidor", "error");
      } finally {
        esconderLoading();
      }
    }

    function render() {
      const lista = document.getElementById("lista");
      const busca = document.getElementById("busca").value.toLowerCase();
      const filtro = document.getElementById("filtro").value;

      const filtrados = chamados
        .filter(c => (c.titulo || "").toLowerCase().includes(busca))
        .filter(c => !filtro || c.status_chamado === filtro);

      lista.innerHTML = "";

      if (filtrados.length === 0) {
        lista.innerHTML = `
          <div class="empty">
            <h3>Nenhum chamado encontrado</h3>
            <p>Tente alterar o filtro, buscar outro termo ou cadastrar um novo chamado.</p>
          </div>
        `;
        return;
      }

      filtrados.forEach(c => {
        const podeEditar = usuario.tipo_usuario === "admin" && c.status_chamado === "Aberto";

        lista.innerHTML += `
          <div class="card">
            <h3>${c.titulo || ""}</h3>
            <p class="descricao">${c.descricao || "Sem descrição informada."}</p>

            <div class="meta">
              <p><b>Morador:</b> <span>${c.morador || "-"}</span></p>
              <p><b>Local:</b> <span>${c.local_chamado || "-"}</span></p>
            </div>

            <div class="card-footer">
              <span class="status ${String(c.status_chamado || "").replace(" ","").toLowerCase()}">
                ${c.status_chamado || "Sem status"}
              </span>

              ${podeEditar ? `
                <div class="actions">
                  <button class="btn btn-warning" onclick='abrirModalEditar(${JSON.stringify(c).replace(/'/g, "&apos;")})'>Editar</button>
                  <button class="btn btn-danger" onclick="excluir(${c.chamado_id})">Excluir</button>
                </div>
              ` : ""}
            </div>
          </div>
        `;
      });
    }

    function abrirModalNovo() {
      modoEdicao = false;
      document.getElementById("modalTitulo").innerText = "Novo Chamado";
      document.getElementById("modalSubtitulo").innerText = "Preencha as informações abaixo.";
      document.getElementById("btnSalvarModal").innerText = "Salvar";
      document.getElementById("chamadoId").value = "";
      document.getElementById("tituloChamado").value = "";
      document.getElementById("moradorChamado").value = "";
      document.getElementById("localChamado").value = "";
      document.getElementById("statusChamado").value = "Aberto";
      document.getElementById("descricaoChamado").value = "";
      document.getElementById("statusChamado").disabled = true;
      document.getElementById("modalChamado").classList.add("show");
    }

    function abrirModalEditar(chamado) {
      modoEdicao = true;
      document.getElementById("modalTitulo").innerText = "Editar Chamado";
      document.getElementById("modalSubtitulo").innerText = "Atualize os dados do chamado.";
      document.getElementById("btnSalvarModal").innerText = "Atualizar";
      document.getElementById("chamadoId").value = chamado.chamado_id || "";
      document.getElementById("tituloChamado").value = chamado.titulo || "";
      document.getElementById("moradorChamado").value = chamado.morador || "";
      document.getElementById("localChamado").value = chamado.local_chamado || "";
      document.getElementById("statusChamado").value = chamado.status_chamado || "Aberto";
      document.getElementById("descricaoChamado").value = chamado.descricao || "";
      document.getElementById("statusChamado").disabled = false;
      document.getElementById("modalChamado").classList.add("show");
    }

    function fecharModal() {
      document.getElementById("modalChamado").classList.remove("show");
    }

    async function salvarChamado() {
      const id = document.getElementById("chamadoId").value;
      const titulo = document.getElementById("tituloChamado").value.trim();
      const morador = document.getElementById("moradorChamado").value.trim();
      const local = document.getElementById("localChamado").value.trim();
      const status = document.getElementById("statusChamado").value;
      const descricao = document.getElementById("descricaoChamado").value.trim();

      if (!titulo || !morador || !local) {
        toast("Preencha os campos obrigatórios", "error");
        return;
      }

      try {
        mostrarLoading();

        if (!modoEdicao) {
          await fetch(`${API}/chamados`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              titulo,
              morador,
              local_chamado: local,
              status_chamado: "Aberto",
              descricao,
              usuario_id: usuario.usuario_id
            })
          });

          toast("Chamado criado com sucesso");
        } else {
          await fetch(`${API}/chamados/${id}`, {
            method: "PUT",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              titulo,
              morador,
              local_chamado: local,
              status_chamado: status,
              descricao,
              tipo_usuario: usuario.tipo_usuario
            })
          });

          toast("Chamado atualizado com sucesso");
        }

        fecharModal();
        await carregar();
      } catch (error) {
        console.error(error);
        toast("Erro ao salvar chamado", "error");
      } finally {
        esconderLoading();
      }
    }

    async function excluir(id) {
      if (!confirm("Deseja realmente excluir este chamado?")) return;

      try {
        mostrarLoading();
        await fetch(`${API}/chamados/${id}`, {
          method: "DELETE",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            tipo_usuario: usuario.tipo_usuario
          })
        });

        toast("Chamado excluído com sucesso");
        await carregar();
      } catch (error) {
        console.error(error);
        toast("Erro ao excluir chamado", "error");
      } finally {
        esconderLoading();
      }
    }

    function logout() {
      localStorage.removeItem("usuario");
      localStorage.removeItem("usuarioLogado");
      window.location.href = "index.html";
    }

    window.addEventListener("click", function(e) {
      const modal = document.getElementById("modalChamado");
      if (e.target === modal) {
        fecharModal();
      }
    });

    carregar();
  </script>
</body>
</html>
