<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Painel de Chamados</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:"Segoe UI", Arial, sans-serif;
}

body{
  background:#eef2f7;
  color:#0f172a;
}

/* HEADER */
header{
  background:linear-gradient(135deg,#1e3a8a,#2563eb);
  color:white;
  padding:20px 30px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:12px;
  flex-wrap:wrap;
  box-shadow:0 10px 25px rgba(0,0,0,0.08);
}

.header-left{
  display:flex;
  align-items:center;
  gap:12px;
}

.header-logo{
  width:48px;
  height:48px;
  border-radius:14px;
  background:rgba(255,255,255,0.16);
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:24px;
  border:1px solid rgba(255,255,255,0.2);
}

header h2{
  font-size:24px;
}

.top-right{
  display:flex;
  align-items:center;
  gap:12px;
  flex-wrap:wrap;
}

.user-badge{
  background:rgba(255,255,255,0.15);
  border:1px solid rgba(255,255,255,0.2);
  padding:10px 14px;
  border-radius:999px;
  font-size:14px;
}

header button{
  background:#dc2626;
  color:white;
  border:none;
  padding:10px 16px;
  border-radius:10px;
  cursor:pointer;
  font-weight:700;
}

/* CONTAINER */
.container{
  max-width:1200px;
  margin:24px auto;
  padding:0 20px 30px;
}

/* STATS */
.stats{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:14px;
  margin-bottom:18px;
}

.stat{
  background:white;
  border-radius:16px;
  padding:18px;
  box-shadow:0 10px 25px rgba(15,23,42,0.08);
  border:1px solid #dbe2ea;
}

.stat h3{
  font-size:13px;
  color:#64748b;
  margin-bottom:8px;
}

.stat p{
  font-size:28px;
  font-weight:800;
}

/* TOOLBAR */
.toolbar{
  background:white;
  border:1px solid #dbe2ea;
  border-radius:16px;
  box-shadow:0 10px 25px rgba(15,23,42,0.08);
  padding:16px;
  margin-bottom:20px;
}

.controls{
  display:flex;
  gap:12px;
  flex-wrap:wrap;
  align-items:center;
}

input, select, textarea{
  border:1px solid #cbd5e1;
  border-radius:12px;
  padding:12px 14px;
  font-size:15px;
  outline:none;
  transition:0.2s;
  background:#fff;
}

input:focus, select:focus, textarea:focus{
  border-color:#2563eb;
  box-shadow:0 0 0 4px rgba(37,99,235,0.12);
}

#busca{
  min-width:260px;
  flex:1;
  height:48px;
}

#filtro{
  min-width:180px;
  height:48px;
}

.btn{
  border:none;
  border-radius:12px;
  cursor:pointer;
  font-weight:700;
  transition:0.2s;
}

.btn:hover{
  transform:translateY(-1px);
}

.btn-success{
  background:#16a34a;
  color:white;
  height:48px;
  padding:0 18px;
}

.btn-warning{
  background:#f59e0b;
  color:white;
  padding:10px 14px;
}

.btn-danger{
  background:#dc2626;
  color:white;
  padding:10px 14px;
}

.btn-secondary{
  background:#e5e7eb;
  color:#111827;
  padding:10px 14px;
}

/* GRID */
.cards{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(300px,1fr));
  gap:18px;
}

/* CARD */
.card{
  background:white;
  padding:20px;
  border-radius:18px;
  box-shadow:0 10px 25px rgba(15,23,42,0.08);
  border:1px solid #dbe2ea;
  position:relative;
  overflow:hidden;
}

.card::before{
  content:"";
  position:absolute;
  top:0;
  left:0;
  width:100%;
  height:5px;
  background:linear-gradient(90deg,#2563eb,#60a5fa);
}

.card h3{
  margin-bottom:10px;
  font-size:24px;
}

.card .desc{
  color:#64748b;
  margin-bottom:16px;
  min-height:42px;
  line-height:1.5;
}

.card p{
  margin:6px 0;
}

.card p span{
  color:#64748b;
}

.footer-card{
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:12px;
  flex-wrap:wrap;
  margin-top:14px;
}

.status{
  display:inline-flex;
  padding:8px 14px;
  border-radius:999px;
  font-size:13px;
  font-weight:800;
}

.aberto{background:#dbeafe;color:#1d4ed8;}
.emandamento{background:#fef3c7;color:#a16207;}
.concluido{background:#dcfce7;color:#15803d;}

.acoes{
  display:flex;
  gap:10px;
  flex-wrap:wrap;
}

.empty{
  grid-column:1/-1;
  background:white;
  border:1px dashed #cbd5e1;
  border-radius:18px;
  padding:40px 20px;
  text-align:center;
  color:#64748b;
}

/* MODAL */
.modal{
  position:fixed;
  inset:0;
  background:rgba(15,23,42,0.5);
  display:none;
  align-items:center;
  justify-content:center;
  padding:20px;
  z-index:1000;
}

.modal.show{
  display:flex;
}

.modal-box{
  width:100%;
  max-width:520px;
  background:white;
  border-radius:22px;
  box-shadow:0 25px 60px rgba(0,0,0,0.25);
  padding:24px;
  animation:subir .25s ease;
}

.modal-box h3{
  font-size:28px;
  margin-bottom:6px;
}

.modal-box .sub{
  color:#64748b;
  margin-bottom:18px;
}

.form-grid{
  display:grid;
  gap:12px;
}

textarea{
  min-height:110px;
  resize:vertical;
}

.modal-actions{
  display:flex;
  justify-content:flex-end;
  gap:10px;
  margin-top:18px;
  flex-wrap:wrap;
}

.toast{
  position:fixed;
  top:20px;
  right:20px;
  padding:14px 18px;
  border-radius:12px;
  color:white;
  font-weight:700;
  z-index:1100;
  box-shadow:0 10px 25px rgba(15,23,42,0.18);
}

.success{background:#16a34a;}
.error{background:#dc2626;}

@keyframes subir{
  from{opacity:0;transform:translateY(12px);}
  to{opacity:1;transform:translateY(0);}
}

@media (max-width:900px){
  .stats{
    grid-template-columns:repeat(2,1fr);
  }
}

@media (max-width:600px){
  .stats{
    grid-template-columns:1fr;
  }

  .controls{
    flex-direction:column;
    align-items:stretch;
  }

  #busca,#filtro,.btn-success{
    width:100%;
  }

  header{
    padding:20px;
  }

  header h2{
    font-size:21px;
  }
}
</style>
</head>

<body>

<header>
  <div class="header-left">
    <div class="header-logo">🔐</div>
    <h2>Controle de Chamados</h2>
  </div>

  <div class="top-right">
    <div class="user-badge" id="usuarioInfo">Usuário</div>
    <button onclick="logout()">Sair</button>
  </div>
</header>

<div class="container">

  <div class="stats">
    <div class="stat">
      <h3>Total de Chamados</h3>
      <p id="statTotal">0</p>
    </div>
    <div class="stat">
      <h3>Em Aberto</h3>
      <p id="statAberto">0</p>
    </div>
    <div class="stat">
      <h3>Em Andamento</h3>
      <p id="statAndamento">0</p>
    </div>
    <div class="stat">
      <h3>Concluídos</h3>
      <p id="statConcluido">0</p>
    </div>
  </div>

  <div class="toolbar">
    <div class="controls">
      <button class="btn btn-success" onclick="abrirNovo()">+ Novo Chamado</button>
      <input id="busca" placeholder="Buscar por título..." oninput="render()">
      <select id="filtro" onchange="render()">
        <option value="">Todos os status</option>
        <option value="Aberto">Aberto</option>
        <option value="Em andamento">Em andamento</option>
        <option value="Concluído">Concluído</option>
      </select>
    </div>
  </div>

  <div id="lista" class="cards"></div>
</div>

<div id="modal" class="modal">
  <div class="modal-box">
    <h3 id="modalTitulo">Novo Chamado</h3>
    <p class="sub" id="modalSub">Preencha as informações abaixo.</p>

    <div class="form-grid">
      <input type="hidden" id="chamadoId">

      <input id="titulo" type="text" placeholder="Título do chamado">
      <input id="morador" type="text" placeholder="Nome do morador">
      <input id="local" type="text" placeholder="Local do problema">

      <select id="status">
        <option value="Aberto">Aberto</option>
        <option value="Em andamento">Em andamento</option>
        <option value="Concluído">Concluído</option>
      </select>

      <textarea id="descricao" placeholder="Descrição do chamado"></textarea>
    </div>

    <div class="modal-actions">
      <button class="btn btn-secondary" onclick="fecharModal()">Cancelar</button>
      <button class="btn btn-success" onclick="salvarChamado()">Salvar</button>
    </div>
  </div>
</div>

<script>
const API = "https://backend-chamados-production.up.railway.app";

let usuario = JSON.parse(localStorage.getItem("usuario"));
let chamados = [];
let editando = false;

if (!usuario) {
  location.href = "index.html";
}

document.getElementById("usuarioInfo").innerText =
  `${usuario.nome || usuario.login || "Usuário"} • ${usuario.tipo_usuario}`;

function toast(msg, type = "success"){
  const t = document.createElement("div");
  t.className = "toast " + type;
  t.innerText = msg;
  document.body.appendChild(t);
  setTimeout(() => t.remove(), 3000);
}

function formatarClasse(status){
  return status
    .normalize("NFD")
    .replace(/[\u0300-\u036f]/g,"")
    .replace(/\s+/g,"")
    .toLowerCase();
}

function atualizarStats(){
  document.getElementById("statTotal").innerText = chamados.length;
  document.getElementById("statAberto").innerText =
    chamados.filter(c => c.status_chamado === "Aberto").length;
  document.getElementById("statAndamento").innerText =
    chamados.filter(c => c.status_chamado === "Em andamento").length;
  document.getElementById("statConcluido").innerText =
    chamados.filter(c => c.status_chamado === "Concluído").length;
}

function carregar(){
  fetch(`${API}/chamados?usuario_id=${usuario.usuario_id}&tipo_usuario=${usuario.tipo_usuario}`)
    .then(r => r.json())
    .then(data => {
      chamados = Array.isArray(data) ? data : [];
      atualizarStats();
      render();
    })
    .catch(() => toast("Erro ao carregar chamados", "error"));
}

function render(){
  const lista = document.getElementById("lista");
  const busca = document.getElementById("busca").value.toLowerCase();
  const filtro = document.getElementById("filtro").value;

  const filtrados = chamados
    .filter(c => (c.titulo || "").toLowerCase().includes(busca))
    .filter(c => !filtro || c.status_chamado === filtro);

  lista.innerHTML = "";

  if (!filtrados.length){
    lista.innerHTML = `
      <div class="empty">
        <h3>Nenhum chamado encontrado</h3>
        <p>Tente outro filtro ou crie um novo chamado.</p>
      </div>
    `;
    return;
  }

  filtrados.forEach(c => {
    const statusBloqueado = c.status_chamado === "Concluído" || c.status_chamado === "Fechado";
    const podeEditar = usuario.tipo_usuario === "admin" && !statusBloqueado;

    lista.innerHTML += `
      <div class="card">
        <h3>${c.titulo}</h3>
        <p class="desc">${c.descricao || "Sem descrição informada."}</p>

        <p><b>Morador:</b> <span>${c.morador}</span></p>
        <p><b>Local:</b> <span>${c.local_chamado}</span></p>

        <div class="footer-card">
          <span class="status ${formatarClasse(c.status_chamado === 'Fechado' ? 'Concluído' : c.status_chamado)}">
            ${c.status_chamado === 'Fechado' ? 'Concluído' : c.status_chamado}
          </span>

          ${podeEditar ? `
            <div class="acoes">
              <button class="btn btn-warning" onclick="abrirEditar(${c.chamado_id})">Editar</button>
              <button class="btn btn-danger" onclick="excluir(${c.chamado_id})">Excluir</button>
            </div>
          ` : ""}
        </div>
      </div>
    `;
  });
}

function limparFormulario(){
  document.getElementById("chamadoId").value = "";
  document.getElementById("titulo").value = "";
  document.getElementById("morador").value = "";
  document.getElementById("local").value = "";
  document.getElementById("descricao").value = "";
  document.getElementById("status").value = "Aberto";
}

function abrirNovo(){
  editando = false;
  limparFormulario();
  document.getElementById("modalTitulo").innerText = "Novo Chamado";
  document.getElementById("modalSub").innerText = "Preencha as informações abaixo.";
  document.getElementById("status").disabled = true;
  document.getElementById("modal").classList.add("show");
}

function abrirEditar(id){
  const chamado = chamados.find(c => c.chamado_id === id);
  if (!chamado) return;

  editando = true;
  document.getElementById("chamadoId").value = chamado.chamado_id;
  document.getElementById("titulo").value = chamado.titulo || "";
  document.getElementById("morador").value = chamado.morador || "";
  document.getElementById("local").value = chamado.local_chamado || "";
  document.getElementById("descricao").value = chamado.descricao || "";
  document.getElementById("status").value =
    chamado.status_chamado === "Fechado" ? "Concluído" : (chamado.status_chamado || "Aberto");

  document.getElementById("modalTitulo").innerText = "Editar Chamado";
  document.getElementById("modalSub").innerText = "Atualize as informações do chamado.";
  document.getElementById("status").disabled = false;
  document.getElementById("modal").classList.add("show");
}

function fecharModal(){
  document.getElementById("modal").classList.remove("show");
}

function salvarChamado(){
  const id = document.getElementById("chamadoId").value;
  const titulo = document.getElementById("titulo").value.trim();
  const morador = document.getElementById("morador").value.trim();
  const local = document.getElementById("local").value.trim();
  const descricao = document.getElementById("descricao").value.trim();
  const status = document.getElementById("status").value;

  if (!titulo || !morador || !local){
    toast("Preencha os campos obrigatórios", "error");
    return;
  }

  if (!editando){
    fetch(`${API}/chamados`, {
      method:"POST",
      headers:{ "Content-Type":"application/json" },
      body:JSON.stringify({
        titulo,
        morador,
        local_chamado: local,
        descricao,
        usuario_id: usuario.usuario_id
      })
    })
    .then(r => r.json())
    .then(data => {
      if (data.erro){
        toast(data.erro, "error");
        return;
      }
      toast("Chamado criado com sucesso");
      fecharModal();
      carregar();
    })
    .catch(() => toast("Erro ao criar chamado", "error"));
  } else {
    fetch(`${API}/chamados/${id}`, {
      method:"PUT",
      headers:{ "Content-Type":"application/json" },
      body:JSON.stringify({
        titulo,
        status_chamado: status,
        tipo_usuario: usuario.tipo_usuario
      })
    })
    .then(r => r.json())
    .then(data => {
      if (data.erro){
        toast(data.erro, "error");
        return;
      }
      toast("Chamado atualizado com sucesso");
      fecharModal();
      carregar();
    })
    .catch(() => toast("Erro ao atualizar chamado", "error"));
  }
}

function excluir(id){
  if (!confirm("Excluir este chamado?")) return;

  fetch(`${API}/chamados/${id}`, {
    method:"DELETE",
    headers:{ "Content-Type":"application/json" },
    body:JSON.stringify({
      tipo_usuario: usuario.tipo_usuario
    })
  })
  .then(r => r.json())
  .then(data => {
    if (data.erro){
      toast(data.erro, "error");
      return;
    }
    toast("Chamado excluído com sucesso");
    carregar();
  })
  .catch(() => toast("Erro ao excluir chamado", "error"));
}

function logout(){
  localStorage.clear();
  location.href = "index.html";
}

window.addEventListener("click", (e) => {
  const modal = document.getElementById("modal");
  if (e.target === modal){
    fecharModal();
  }
});

carregar();
</script>

</body>
</html>
