<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Painel de Chamados</title>

<style>
:root{
  --azul-escuro:#1e3a8a;
  --azul:#2563eb;
  --azul-claro:#dbeafe;
  --verde:#16a34a;
  --verde-claro:#dcfce7;
  --amarelo:#f59e0b;
  --amarelo-claro:#fef3c7;
  --vermelho:#dc2626;
  --cinza-fundo:#eef2f7;
  --cinza-borda:#dbe2ea;
  --cinza-texto:#475569;
  --branco:#ffffff;
  --sombra:0 10px 25px rgba(15, 23, 42, 0.08);
  --radius:16px;
}

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:"Segoe UI", Arial, sans-serif;
}

body{
  background:linear-gradient(180deg, #eaf1fb 0%, #eef2f7 100%);
  color:#0f172a;
  min-height:100vh;
}

header{
  background:linear-gradient(135deg, var(--azul-escuro), #1d4ed8);
  color:var(--branco);
  padding:22px 28px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  flex-wrap:wrap;
  gap:16px;
  box-shadow:var(--sombra);
}

.header-left h1{
  font-size:34px;
  margin-bottom:6px;
}

.header-left p{
  font-size:14px;
  opacity:0.9;
}

.header-right{
  display:flex;
  align-items:center;
  gap:12px;
  flex-wrap:wrap;
}

.user-badge{
  background:rgba(255,255,255,0.15);
  border:1px solid rgba(255,255,255,0.2);
  padding:10px 14px;
  border-radius:999px;
  font-size:14px;
  backdrop-filter:blur(8px);
}

.container{
  max-width:1200px;
  margin:28px auto;
  padding:0 20px 30px;
}

.topbar{
  display:grid;
  grid-template-columns:repeat(12, 1fr);
  gap:14px;
  margin-bottom:20px;
}

.card-top{
  background:rgba(255,255,255,0.9);
  border:1px solid var(--cinza-borda);
  border-radius:var(--radius);
  box-shadow:var(--sombra);
  padding:16px;
}

.stats{
  display:grid;
  grid-template-columns:repeat(4, 1fr);
  gap:14px;
  margin-bottom:18px;
}

.stat-box{
  background:var(--branco);
  border-radius:var(--radius);
  padding:18px;
  box-shadow:var(--sombra);
  border:1px solid var(--cinza-borda);
}

.stat-box h3{
  font-size:13px;
  color:var(--cinza-texto);
  margin-bottom:8px;
  font-weight:600;
}

.stat-box p{
  font-size:28px;
  font-weight:700;
}

.controls{
  display:flex;
  gap:12px;
  flex-wrap:wrap;
  align-items:center;
}

input, select{
  height:48px;
  border:1px solid var(--cinza-borda);
  border-radius:12px;
  padding:0 14px;
  font-size:15px;
  background:var(--branco);
  outline:none;
  transition:0.2s;
}

input:focus, select:focus{
  border-color:var(--azul);
  box-shadow:0 0 0 4px rgba(37,99,235,0.12);
}

#busca{
  min-width:260px;
  flex:1;
}

#filtro{
  min-width:180px;
}

.btn{
  height:48px;
  padding:0 18px;
  border:none;
  border-radius:12px;
  cursor:pointer;
  font-weight:600;
  transition:0.2s;
  display:inline-flex;
  align-items:center;
  justify-content:center;
  gap:8px;
}

.btn:hover{
  transform:translateY(-1px);
}

.btn-success{
  background:var(--verde);
  color:white;
}

.btn-success:hover{
  background:#15803d;
}

.btn-warning{
  background:var(--amarelo);
  color:white;
}

.btn-warning:hover{
  background:#d97706;
}

.btn-danger{
  background:var(--vermelho);
  color:white;
}

.btn-danger:hover{
  background:#b91c1c;
}

.btn-outline{
  background:rgba(255,255,255,0.16);
  color:white;
  border:1px solid rgba(255,255,255,0.25);
}

.btn-outline:hover{
  background:rgba(255,255,255,0.24);
}

.grid-chamados{
  display:grid;
  grid-template-columns:repeat(auto-fit, minmax(300px, 1fr));
  gap:18px;
}

.card{
  background:var(--branco);
  border:1px solid var(--cinza-borda);
  border-radius:20px;
  box-shadow:var(--sombra);
  padding:20px;
  position:relative;
  overflow:hidden;
}

.card::before{
  content:"";
  position:absolute;
  top:0;
  left:0;
  width:100%;
  height:5px;
  background:linear-gradient(90deg, var(--azul), #60a5fa);
}

.card h3{
  font-size:23px;
  margin-bottom:10px;
  color:#0f172a;
}

.desc{
  color:var(--cinza-texto);
  margin-bottom:16px;
  line-height:1.5;
  min-height:48px;
}

.info{
  display:grid;
  gap:8px;
  margin-bottom:16px;
}

.info p{
  color:#0f172a;
  font-size:15px;
}

.info span{
  color:var(--cinza-texto);
  font-weight:500;
}

.footer-card{
  display:flex;
  justify-content:space-between;
  align-items:center;
  flex-wrap:wrap;
  gap:12px;
  margin-top:8px;
}

.acoes{
  display:flex;
  gap:10px;
  flex-wrap:wrap;
}

.status{
  display:inline-flex;
  align-items:center;
  justify-content:center;
  padding:8px 14px;
  border-radius:999px;
  font-size:13px;
  font-weight:700;
}

.aberto{
  background:var(--azul-claro);
  color:#1d4ed8;
}

.emandamento{
  background:var(--amarelo-claro);
  color:#a16207;
}

.fechado{
  background:var(--verde-claro);
  color:#15803d;
}

.empty{
  background:var(--branco);
  border:1px dashed #cbd5e1;
  border-radius:20px;
  box-shadow:var(--sombra);
  padding:50px 20px;
  text-align:center;
  color:var(--cinza-texto);
}

.empty h3{
  color:#0f172a;
  margin-bottom:8px;
  font-size:24px;
}

.toast{
  position:fixed;
  top:20px;
  right:20px;
  padding:14px 18px;
  border-radius:12px;
  color:white;
  font-weight:700;
  box-shadow:var(--sombra);
  z-index:9999;
  animation:fadeIn .25s ease;
}

.success{background:var(--verde);}
.error{background:var(--vermelho);}

@keyframes fadeIn{
  from{opacity:0; transform:translateY(-10px);}
  to{opacity:1; transform:translateY(0);}
}

@media (max-width:900px){
  .stats{
    grid-template-columns:repeat(2, 1fr);
  }

  .header-left h1{
    font-size:28px;
  }
}

@media (max-width:600px){
  .stats{
    grid-template-columns:1fr;
  }

  .controls{
    flex-direction:column;
    align-items:stretch;
  }

  #busca, #filtro, .btn{
    width:100%;
  }

  header{
    padding:20px;
  }

  .header-left h1{
    font-size:24px;
  }
}
</style>
</head>

<body>

<header>
  <div class="header-left">
    <h1>Painel de Chamados</h1>
    <p>Acompanhe, filtre e gerencie os chamados do sistema</p>
  </div>

  <div class="header-right">
    <div class="user-badge" id="usuarioInfo">Usuário</div>
    <button class="btn btn-outline" onclick="logout()">Sair</button>
  </div>
</header>

<div class="container">

  <div class="stats">
    <div class="stat-box">
      <h3>Total de Chamados</h3>
      <p id="statTotal">0</p>
    </div>
    <div class="stat-box">
      <h3>Em Aberto</h3>
      <p id="statAberto">0</p>
    </div>
    <div class="stat-box">
      <h3>Em Andamento</h3>
      <p id="statAndamento">0</p>
    </div>
    <div class="stat-box">
      <h3>Fechados</h3>
      <p id="statFechado">0</p>
    </div>
  </div>

  <div class="card-top">
    <div class="controls">
      <button class="btn btn-success" onclick="novo()">+ Novo Chamado</button>
      <input id="busca" placeholder="Buscar por título..." oninput="render()">
      <select id="filtro" onchange="render()">
        <option value="">Todos os status</option>
        <option value="Aberto">Aberto</option>
        <option value="Em andamento">Em andamento</option>
        <option value="Fechado">Fechado</option>
      </select>
    </div>
  </div>

  <div id="lista" class="grid-chamados" style="margin-top:20px;"></div>

</div>

<script>
const API = "https://backend-chamados-production.up.railway.app";
let chamados = [];

let usuario = null;

try {
  usuario =
    JSON.parse(localStorage.getItem("usuario")) ||
    JSON.parse(localStorage.getItem("usuarioLogado"));
} catch (e) {
  console.error("Erro ao ler localStorage:", e);
}

if (!usuario) {
  window.location.href = "index.html";
}

if (usuario) {
  usuario.usuario_id =
    usuario.usuario_id ?? usuario.id ?? usuario.id_usuario ?? usuario.usuarioId;

  usuario.tipo_usuario =
    usuario.tipo_usuario ?? usuario.tipo ?? usuario.perfil ?? usuario.tipoUser;

  usuario.nome_exibicao =
    usuario.nome ?? usuario.login ?? usuario.usuario ?? "Usuário";
}

document.getElementById("usuarioInfo").innerText =
  `${usuario.nome_exibicao} • ${usuario.tipo_usuario}`;

function toast(msg, type = "success") {
  const t = document.createElement("div");
  t.className = "toast " + type;
  t.innerText = msg;
  document.body.appendChild(t);
  setTimeout(() => t.remove(), 3000);
}

function atualizarEstatisticas(lista) {
  const total = lista.length;
  const aberto = lista.filter(c => c.status_chamado === "Aberto").length;
  const andamento = lista.filter(c => c.status_chamado === "Em andamento").length;
  const fechado = lista.filter(c => c.status_chamado === "Fechado").length;

  document.getElementById("statTotal").innerText = total;
  document.getElementById("statAberto").innerText = aberto;
  document.getElementById("statAndamento").innerText = andamento;
  document.getElementById("statFechado").innerText = fechado;
}

async function carregar() {
  try {
    const url = `${API}/chamados?usuario_id=${usuario.usuario_id}&tipo_usuario=${encodeURIComponent(usuario.tipo_usuario)}`;
    const res = await fetch(url);
    const texto = await res.text();

    try {
      chamados = JSON.parse(texto);
    } catch {
      chamados = [];
      toast("Erro ao carregar chamados", "error");
      return;
    }

    if (!Array.isArray(chamados)) chamados = [];

    atualizarEstatisticas(chamados);
    render();
  } catch (error) {
    console.error(error);
    toast("Erro ao conectar com o servidor", "error");
  }
}

function render() {
  const lista = document.getElementById("lista");
  const busca = document.getElementById("busca").value.toLowerCase();
  const filtro = document.getElementById("filtro").value;

  const filtrados = chamados
    .filter(c => (c.titulo || "").toLowerCase().includes(busca))
    .filter(c => !filtro || c.status_chamado === filtro);

  lista.innerHTML = "";

  if (filtrados.length === 0) {
    lista.innerHTML = `
      <div class="empty" style="grid-column:1/-1;">
        <h3>Nenhum chamado encontrado</h3>
        <p>Tente alterar o filtro, pesquisar outro termo ou criar um novo chamado.</p>
      </div>
    `;
    return;
  }

  filtrados.forEach(c => {
    const podeEditar = usuario.tipo_usuario === "admin" && c.status_chamado === "Aberto";

    lista.innerHTML += `
      <div class="card">
        <h3>${c.titulo || ""}</h3>

        <p class="desc">${c.descricao || "Sem descrição informada."}</p>

        <div class="info">
          <p><strong>Morador:</strong> <span>${c.morador || "-"}</span></p>
          <p><strong>Local:</strong> <span>${c.local_chamado || "-"}</span></p>
        </div>

        <div class="footer-card">
          <span class="status ${String(c.status_chamado || "").replace(" ","").toLowerCase()}">
            ${c.status_chamado || "Sem status"}
          </span>

          ${podeEditar ? `
            <div class="acoes">
              <button class="btn btn-warning" onclick="editar(${c.chamado_id})">Editar</button>
              <button class="btn btn-danger" onclick="excluir(${c.chamado_id})">Excluir</button>
            </div>
          ` : ""}
        </div>
      </div>
    `;
  });
}

async function novo() {
  const titulo = prompt("Título do chamado:");
  const morador = prompt("Nome do morador:");
  const local = prompt("Local do problema:");
  const descricao = prompt("Descrição do chamado:");

  if (!titulo || !morador || !local) {
    toast("Preencha os campos obrigatórios", "error");
    return;
  }

  try {
    await fetch(`${API}/chamados`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        titulo,
        morador,
        local_chamado: local,
        status_chamado: "Aberto",
        descricao,
        usuario_id: usuario.usuario_id
      })
    });

    toast("Chamado criado com sucesso");
    carregar();
  } catch (error) {
    console.error(error);
    toast("Erro ao criar chamado", "error");
  }
}

async function editar(id) {
  const titulo = prompt("Novo título:");
  const status = prompt("Status: Aberto / Em andamento / Fechado");

  if (!titulo || !status) {
    toast("Preencha os campos para editar", "error");
    return;
  }

  try {
    await fetch(`${API}/chamados/${id}`, {
      method: "PUT",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        titulo,
        morador: "-",
        local_chamado: "-",
        status_chamado: status,
        descricao: "",
        tipo_usuario: usuario.tipo_usuario
      })
    });

    toast("Chamado atualizado com sucesso");
    carregar();
  } catch (error) {
    console.error(error);
    toast("Erro ao atualizar chamado", "error");
  }
}

async function excluir(id) {
  if (!confirm("Deseja realmente excluir este chamado?")) return;

  try {
    await fetch(`${API}/chamados/${id}`, {
      method: "DELETE",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        tipo_usuario: usuario.tipo_usuario
      })
    });

    toast("Chamado excluído com sucesso");
    carregar();
  } catch (error) {
    console.error(error);
    toast("Erro ao excluir chamado", "error");
  }
}

function logout() {
  localStorage.removeItem("usuario");
  localStorage.removeItem("usuarioLogado");
  window.location.href = "index.html";
}

carregar();
</script>

</body>
</html>
