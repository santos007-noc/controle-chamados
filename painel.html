<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Painel de Chamados</title>

<style>
/* (mesmo CSS que você já tinha — não alterei nada visual) */
body{font-family:"Segoe UI";margin:0;background:#eef2f7;}
header{background:#1e3a8a;color:white;padding:20px;display:flex;justify-content:space-between;}
.container{padding:20px;}
.cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(300px,1fr));gap:15px;}

.card{
  background:white;
  padding:20px;
  border-radius:12px;
  box-shadow:0 5px 15px rgba(0,0,0,0.1);
}

.btn{padding:8px 12px;border:none;border-radius:6px;cursor:pointer;font-weight:bold;}
.btn-warning{background:#f59e0b;color:white;}
.btn-danger{background:#dc2626;color:white;}
.btn-success{background:#16a34a;color:white;}

.status{padding:5px 10px;border-radius:20px;font-size:12px;font-weight:bold;}
.aberto{background:#dbeafe;color:#1e40af;}
.emandamento{background:#fef3c7;color:#92400e;}
.fechado{background:#dcfce7;color:#166534;}

.modal{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.5);
  display:none;
  justify-content:center;
  align-items:center;
}

.modal.show{display:flex;}

.modal-content{
  background:white;
  padding:20px;
  border-radius:12px;
  width:300px;
}

input,select,textarea{
  width:100%;
  padding:8px;
  margin:5px 0;
}
</style>
</head>

<body>

<header>
  <h2>Painel de Chamados</h2>
  <button class="btn btn-danger" onclick="logout()">Sair</button>
</header>

<div class="container">

<button class="btn btn-success" onclick="abrirModalNovo()">+ Novo</button>

<div id="lista" class="cards"></div>

</div>

<!-- MODAL -->
<div class="modal" id="modal">
  <div class="modal-content">
    <h3 id="tituloModal">Novo Chamado</h3>

    <input id="titulo">
    <input id="morador">
    <input id="local">

    <select id="status">
      <option>Aberto</option>
      <option>Em andamento</option>
      <option>Fechado</option>
    </select>

    <textarea id="descricao"></textarea>

    <button class="btn btn-success" onclick="salvar()">Salvar</button>
    <button onclick="fecharModal()">Cancelar</button>
  </div>
</div>

<script>
const API="https://backend-chamados-production.up.railway.app";

let usuario=JSON.parse(localStorage.getItem("usuario"));
let chamados=[];
let editando=null;

if(!usuario) location.href="index.html";

function carregar(){
  fetch(`${API}/chamados?usuario_id=${usuario.usuario_id}&tipo_usuario=${usuario.tipo_usuario}`)
  .then(r=>r.json())
  .then(data=>{
    chamados=data;
    render();
  });
}

function render(){
  const lista=document.getElementById("lista");
  lista.innerHTML="";

  chamados.forEach(c=>{

    // 🔥 REGRA AQUI
    const podeEditar = usuario.tipo_usuario === "admin" && c.status_chamado !== "Fechado";

    lista.innerHTML+=`
      <div class="card">
        <h3>${c.titulo}</h3>
        <p>${c.descricao||""}</p>

        <p><b>Morador:</b> ${c.morador}</p>
        <p><b>Local:</b> ${c.local_chamado}</p>

        <span class="status ${c.status_chamado.replace(" ","").toLowerCase()}">
          ${c.status_chamado}
        </span>

        ${podeEditar?`
        <div style="margin-top:10px;">
          <button class="btn btn-warning" onclick='editar(${JSON.stringify(c)})'>Editar</button>
          <button class="btn btn-danger" onclick="excluir(${c.chamado_id})">Excluir</button>
        </div>`:""}
      </div>
    `;
  });
}

function abrirModalNovo(){
  editando=null;
  document.getElementById("modal").classList.add("show");
}

function editar(c){
  editando=c;
  document.getElementById("titulo").value=c.titulo;
  document.getElementById("morador").value=c.morador;
  document.getElementById("local").value=c.local_chamado;
  document.getElementById("status").value=c.status_chamado;
  document.getElementById("descricao").value=c.descricao;

  document.getElementById("modal").classList.add("show");
}

function fecharModal(){
  document.getElementById("modal").classList.remove("show");
}

function salvar(){
  const titulo=document.getElementById("titulo").value;
  const morador=document.getElementById("morador").value;
  const local=document.getElementById("local").value;
  const status=document.getElementById("status").value;
  const descricao=document.getElementById("descricao").value;

  if(!titulo||!morador||!local){
    alert("Preencha os campos");
    return;
  }

  if(!editando){
    fetch(`${API}/chamados`,{
      method:"POST",
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({
        titulo,
        morador,
        local_chamado:local,
        status_chamado:"Aberto",
        descricao,
        usuario_id:usuario.usuario_id
      })
    }).then(()=>carregar());
  }else{
    fetch(`${API}/chamados/${editando.chamado_id}`,{
      method:"PUT",
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({
        titulo,
        morador,
        local_chamado:local,
        status_chamado:status,
        descricao,
        tipo_usuario:usuario.tipo_usuario
      })
    }).then(()=>carregar());
  }

  fecharModal();
}

function excluir(id){
  if(!confirm("Excluir?")) return;

  fetch(`${API}/chamados/${id}`,{
    method:"DELETE",
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({
      tipo_usuario:usuario.tipo_usuario
    })
  }).then(()=>carregar());
}

function logout(){
  localStorage.clear();
  location.href="index.html";
}

carregar();
</script>

</body>
</html>
