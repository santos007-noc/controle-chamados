<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Cadastro de Usuário</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: linear-gradient(135deg, #1e3c72, #2a5298);
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .box {
      background: white;
      padding: 30px;
      border-radius: 10px;
      width: 320px;
      text-align: center;
      box-shadow: 0 5px 20px rgba(0,0,0,0.3);
    }

    h2 {
      margin-bottom: 20px;
    }

    input {
      width: 100%;
      padding: 10px;
      margin: 8px 0;
      border-radius: 5px;
      border: 1px solid #ccc;
      box-sizing: border-box;
    }

    button {
      width: 100%;
      padding: 10px;
      margin-top: 10px;
      border: none;
      border-radius: 5px;
      cursor: pointer;
    }

    .cadastrar {
      background: #2a5298;
      color: white;
    }

    .cadastrar:hover {
      background: #1e3c72;
    }

    .voltar {
      background: #eee;
    }

    .voltar:hover {
      background: #ddd;
    }

    .mensagem {
      margin-top: 10px;
      font-size: 14px;
      color: red;
    }
  </style>
</head>
<body>

  <div class="box">
    <h2>Cadastrar Usuário</h2>

    <input type="text" id="nome" placeholder="Nome completo">
    <input type="text" id="login" placeholder="Login">
    <input type="password" id="senha" placeholder="Senha">
    <input type="password" id="confirmar" placeholder="Confirmar senha">

    <button class="cadastrar" onclick="cadastrar()">Cadastrar</button>
    <button class="voltar" onclick="voltar()">Voltar</button>

    <div id="mensagem" class="mensagem"></div>
  </div>

  <script>
    const API_URL = 'https://backend-chamados-production.up.railway.app';

    function cadastrar() {
      const nome = document.getElementById('nome').value.trim();
      const login = document.getElementById('login').value.trim();
      const senha = document.getElementById('senha').value.trim();
      const confirmar = document.getElementById('confirmar').value.trim();
      const mensagem = document.getElementById('mensagem');

      mensagem.innerText = '';

      if (!nome || !login || !senha || !confirmar) {
        mensagem.style.color = 'red';
        mensagem.innerText = 'Preencha todos os campos';
        return;
      }

      if (senha !== confirmar) {
        mensagem.style.color = 'red';
        mensagem.innerText = 'As senhas não coincidem';
        return;
      }

      fetch(`${API_URL}/usuarios`, {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json'
        },
        body: JSON.stringify({
          nome: nome,
          login: login,
          senha: senha
        })
      })
      .then(response => response.json())
      .then(data => {
        if (data.erro) {
          mensagem.style.color = 'red';
          mensagem.innerText = data.erro;
          return;
        }

        mensagem.style.color = 'green';
        mensagem.innerText = 'Usuário cadastrado com sucesso!';

        document.getElementById('nome').value = '';
        document.getElementById('login').value = '';
        document.getElementById('senha').value = '';
        document.getElementById('confirmar').value = '';

        setTimeout(() => {
          window.location.href = 'index.html';
        }, 1000);
      })
      .catch(error => {
        console.error('Erro:', error);
        mensagem.style.color = 'red';
        mensagem.innerText = 'Erro ao cadastrar usuário';
      });
    }

    function voltar() {
      window.location.href = 'index.html';
    }
  </script>

</body>
</html>
