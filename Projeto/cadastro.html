<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Cadastro de Usuário</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: linear-gradient(135deg, #1e3c72, #2a5298);
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .box {
      background: white;
      padding: 30px;
      border-radius: 10px;
      width: 300px;
      text-align: center;
      box-shadow: 0 5px 20px rgba(0,0,0,0.3);
    }

    input {
      width: 100%;
      padding: 10px;
      margin: 8px 0;
      border-radius: 5px;
      border: 1px solid #ccc;
      box-sizing: border-box;
    }

    button {
      width: 100%;
      padding: 10px;
      margin-top: 10px;
      border: none;
      border-radius: 5px;
      cursor: pointer;
    }

    .cadastrar {
      background: #2a5298;
      color: white;
    }

    .voltar {
      background: #eee;
    }

    .mensagem {
      margin-top: 10px;
      font-size: 14px;
      color: red;
    }
  </style>
</head>
<body>

<div class="box">
  <h2>Cadastrar Usuário</h2>

  <input type="text" id="login" placeholder="Usuário">
  <input type="password" id="senha" placeholder="Senha">
  <input type="password" id="confirmar" placeholder="Confirmar senha">

  <button class="cadastrar" onclick="cadastrar()">Cadastrar</button>
  <button class="voltar" onclick="voltar()">Voltar</button>

  <div id="mensagem" class="mensagem"></div>
</div>

<script>
function cadastrar() {
  const login = document.getElementById('login').value;
  const senha = document.getElementById('senha').value;
  const confirmar = document.getElementById('confirmar').value;
  const mensagem = document.getElementById('mensagem');

  if (senha !== confirmar) {
    mensagem.innerText = "As senhas não coincidem";
    return;
  }

  fetch('http://localhost:3000/usuarios', {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json'
    },
    body: JSON.stringify({
      nome: login,
      email: login + '@email.com'
    })
  })
  .then(response => response.json())
  .then(data => {
    mensagem.style.color = 'green';
    mensagem.innerText = "Usuário cadastrado com sucesso!";

    setTimeout(() => {
      window.location.href = "index.html";
    }, 1000);
  })
  .catch(error => {
    console.error(error);
    mensagem.innerText = "Erro ao cadastrar usuário";
  });
}

function voltar() {
  window.location.href = "index.html";
}
</script>

</body>
</html>
