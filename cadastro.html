<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cadastro</title>

<style>
body{
  margin:0;
  font-family:"Segoe UI";
  background:linear-gradient(135deg,#1e3a8a,#2563eb);
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

.box{
  background:white;
  padding:40px;
  border-radius:20px;
  width:350px;
  box-shadow:0 20px 50px rgba(0,0,0,0.2);
  text-align:center;
}

h2{margin-bottom:20px;}

input,select{
  width:100%;
  padding:12px;
  margin:10px 0;
  border-radius:10px;
  border:1px solid #ccc;
}

button{
  width:100%;
  padding:12px;
  margin-top:10px;
  border:none;
  border-radius:10px;
  cursor:pointer;
  font-weight:bold;
}

.salvar{background:#16a34a;color:white;}
.voltar{background:#eee;}

.msg{margin-top:10px;font-size:14px;}
</style>
</head>

<body>

<div class="box">
<h2>Cadastrar Usuário</h2>

<input id="login" placeholder="Usuário">
<input id="senha" type="password" placeholder="Senha">

<select id="tipo">
  <option value="cliente">Cliente</option>
  <option value="admin">Administrador</option>
</select>

<button class="salvar" onclick="cadastrar()">Cadastrar</button>
<button class="voltar" onclick="voltar()">Voltar</button>

<div id="msg" class="msg"></div>
</div>

<script>
const API="https://backend-chamados-production.up.railway.app";

function cadastrar(){
  const login=document.getElementById("login").value.trim();
  const senha=document.getElementById("senha").value.trim();
  const tipo=document.getElementById("tipo").value;
  const msg=document.getElementById("msg");

  if(!login||!senha){
    msg.innerText="Preencha todos os campos";
    msg.style.color="red";
    return;
  }

  fetch(`${API}/usuarios`,{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({login,senha,tipo_usuario:tipo})
  })
  .then(r=>r.json())
  .then(data=>{
    msg.innerText="Usuário cadastrado!";
    msg.style.color="green";
  })
  .catch(()=>{
    msg.innerText="Erro ao cadastrar";
    msg.style.color="red";
  });
}

function voltar(){
  location.href="index.html";
}
</script>

</body>
</html>
