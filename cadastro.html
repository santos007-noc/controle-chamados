<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cadastro - Controle de Chamados</title>

  <style>
    *{
      box-sizing:border-box;
      margin:0;
      padding:0;
      font-family:"Segoe UI", Arial, sans-serif;
    }

    body{
      min-height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      background:
        radial-gradient(circle at top left, rgba(255,255,255,0.12), transparent 25%),
        linear-gradient(135deg, #1e3a8a, #2563eb);
      padding:20px;
    }

    .box{
      width:100%;
      max-width:440px;
      background:rgba(255,255,255,0.97);
      padding:42px 34px;
      border-radius:24px;
      box-shadow:0 25px 60px rgba(0,0,0,0.20);
      text-align:center;
    }

    .logo{
      text-align:center;
      margin-bottom:20px;
    }

    .icon{
      width:74px;
      height:74px;
      margin:0 auto 18px;
      border-radius:20px;
      background:linear-gradient(135deg, #16a34a, #22c55e);
      display:flex;
      align-items:center;
      justify-content:center;
      color:white;
      font-size:32px;
      box-shadow:0 10px 25px rgba(34,197,94,0.28);
    }

    .logo h1{
      font-size:2rem;
      line-height:1.2;
      color:#0f172a;
      margin-bottom:10px;
    }

    .sub{
      color:#64748b;
      font-size:15px;
      margin-bottom:28px;
    }

    .campo{
      text-align:left;
      margin-bottom:14px;
    }

    .campo label{
      display:block;
      margin-bottom:8px;
      color:#334155;
      font-size:14px;
      font-weight:600;
    }

    input{
      width:100%;
      padding:14px 15px;
      border-radius:14px;
      border:1px solid #cbd5e1;
      font-size:15px;
      outline:none;
      transition:0.2s;
      background:#f8fafc;
    }

    input:focus{
      border-color:#2563eb;
      background:white;
      box-shadow:0 0 0 4px rgba(37,99,235,0.12);
    }

    button{
      width:100%;
      padding:14px;
      margin-top:12px;
      border:none;
      border-radius:14px;
      cursor:pointer;
      font-weight:700;
      font-size:15px;
      transition:0.2s;
    }

    button:hover{
      transform:translateY(-1px);
    }

    .salvar{
      background:linear-gradient(135deg, #16a34a, #15803d);
      color:white;
      box-shadow:0 10px 20px rgba(22,163,74,0.22);
    }

    .voltar{
      background:#e5e7eb;
      color:#111827;
    }

    .msg{
      margin-top:14px;
      font-size:14px;
      min-height:20px;
      font-weight:600;
    }
  </style>
</head>

<body>

  <div class="box">
    <div class="logo">
      <div class="icon">👤</div>
      <h1>Cadastrar Usuário</h1>
    </div>

    <p class="sub">Crie sua conta para acessar o sistema de chamados</p>

    <div class="campo">
      <label for="nome">Nome completo</label>
      <input id="nome" type="text" placeholder="Digite seu nome">
    </div>

    <div class="campo">
      <label for="apartamento">Apartamento</label>
      <input id="apartamento" type="text" placeholder="Ex: 104" maxlength="10">
    </div>

    <div class="campo">
      <label for="login">Usuário</label>
      <input id="login" type="text" placeholder="Escolha um usuário">
    </div>

    <div class="campo">
      <label for="senha">Senha</label>
      <input id="senha" type="password" placeholder="Digite sua senha">
    </div>

    <button class="salvar" onclick="cadastrar()">Cadastrar</button>
    <button class="voltar" onclick="voltar()">Voltar</button>

    <div id="msg" class="msg"></div>
  </div>

  <script>
    const API = "https://backend-chamados-wgmi.onrender.com";

    function cadastrar() {
      const nome = document.getElementById("nome").value.trim();
      const apartamento = document.getElementById("apartamento").value.trim();
      const login = document.getElementById("login").value.trim();
      const senha = document.getElementById("senha").value.trim();
      const msg = document.getElementById("msg");

      msg.innerText = "";

      if (!nome || !apartamento || !login || !senha) {
        msg.innerText = "Preencha todos os campos";
        msg.style.color = "red";
        return;
      }

      if (nome.length > 120 || login.length > 120 || senha.length > 120 || apartamento.length > 10) {
        msg.innerText = "Verifique o tamanho dos campos";
        msg.style.color = "red";
        return;
      }

      fetch(`${API}/usuarios`, {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify({ nome, apartamento, login, senha })
      })
      .then(res => res.json())
      .then(data => {
        if (data.erro) {
          msg.innerText = data.erro;
          msg.style.color = "red";
          return;
        }

        msg.innerText = "Usuário cadastrado com sucesso!";
        msg.style.color = "green";

        document.getElementById("nome").value = "";
        document.getElementById("apartamento").value = "";
        document.getElementById("login").value = "";
        document.getElementById("senha").value = "";

        setTimeout(() => {
          window.location.href = "index.html";
        }, 1200);
      })
      .catch(error => {
        console.error(error);
        msg.innerText = "Erro ao cadastrar usuário";
        msg.style.color = "red";
      });
    }

    function voltar() {
      window.location.href = "index.html";
    }
  </script>

</body>
</html>
