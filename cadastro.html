<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cadastro - Controle de Chamados</title>

  <style>
    body{
      margin:0;
      font-family:"Segoe UI", Arial, sans-serif;
      background:linear-gradient(135deg,#1e3a8a,#2563eb);
      display:flex;
      justify-content:center;
      align-items:center;
      min-height:100vh;
    }

    .box{
      background:white;
      padding:40px;
      border-radius:20px;
      width:360px;
      box-shadow:0 20px 50px rgba(0,0,0,0.2);
      text-align:center;
    }

    h2{
      margin-bottom:25px;
      color:#111827;
    }

    input{
      width:100%;
      padding:14px;
      margin:10px 0;
      border-radius:12px;
      border:1px solid #d1d5db;
      box-sizing:border-box;
      font-size:15px;
    }

    input:focus{
      outline:none;
      border-color:#2563eb;
      box-shadow:0 0 0 4px rgba(37,99,235,0.12);
    }

    button{
      width:100%;
      padding:14px;
      margin-top:12px;
      border:none;
      border-radius:12px;
      cursor:pointer;
      font-weight:700;
      font-size:15px;
      transition:0.2s;
    }

    button:hover{
      transform:translateY(-1px);
    }

    .salvar{
      background:#16a34a;
      color:white;
    }

    .salvar:hover{
      background:#15803d;
    }

    .voltar{
      background:#e5e7eb;
      color:#111827;
    }

    .voltar:hover{
      background:#d1d5db;
    }

    .msg{
      margin-top:14px;
      font-size:14px;
      min-height:20px;
    }
  </style>
</head>

<body>

  <div class="box">
    <h2>Cadastrar Usuário</h2>

    <input id="nome" type="text" placeholder="Nome completo">
    <input id="login" type="text" placeholder="Usuário">
    <input id="senha" type="password" placeholder="Senha">

    <button class="salvar" onclick="cadastrar()">Cadastrar</button>
    <button class="voltar" onclick="voltar()">Voltar</button>

    <div id="msg" class="msg"></div>
  </div>

  <script>
    const API = "https://backend-chamados-production.up.railway.app";

    function cadastrar() {
      const nome = document.getElementById("nome").value.trim();
      const login = document.getElementById("login").value.trim();
      const senha = document.getElementById("senha").value.trim();
      const msg = document.getElementById("msg");

      msg.innerText = "";

      if (!nome || !login || !senha) {
        msg.innerText = "Preencha todos os campos";
        msg.style.color = "red";
        return;
      }

      fetch(`${API}/usuarios`, {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify({ nome, login, senha })
      })
      .then(res => res.json())
      .then(data => {
        if (data.erro) {
          msg.innerText = data.erro;
          msg.style.color = "red";
          return;
        }

        msg.innerText = "Usuário cadastrado com sucesso como cliente";
        msg.style.color = "green";

        document.getElementById("nome").value = "";
        document.getElementById("login").value = "";
        document.getElementById("senha").value = "";

        setTimeout(() => {
          window.location.href = "index.html";
        }, 1200);
      })
      .catch(error => {
        console.error(error);
        msg.innerText = "Erro ao cadastrar usuário";
        msg.style.color = "red";
      });
    }

    function voltar() {
      window.location.href = "index.html";
    }
  </script>

</body>
</html>
